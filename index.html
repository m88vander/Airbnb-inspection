<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspection App</title>
  <style>
    body {
      font-family: Arial;
      margin: 15px;
      background: #f5f5f5;
    }
    h2 { margin-bottom: 10px; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    select, textarea, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #0078D4;
      color: white;
      border: none;
      font-weight: bold;
    }

    button.secondary {
      background: gray;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }

    .inspection {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }

    .small {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

<h2>Building Inspection Tool</h2>

<div class="card">
  <label>Category</label>
  <select id="category">
    <option>Kitchen</option>
    <option>Bathroom</option>
    <option>Living Room</option>
    <option>Bedroom</option>
    <option>Exterior</option>
    <option>Other</option>
  </select>

  <label>Photo</label>
  <input type="file" accept="image/*" capture="environment" id="photoInput">

  <img id="preview" style="display:none;" />

  <label>Notes</label>
  <textarea id="notes" placeholder="Add details..."></textarea>

  <button onclick="saveInspection()">Save Inspection</button>
</div>

<div class="card">
  <h3>Saved Inspections</h3>
  <button class="secondary" onclick="exportData()">Export JSON</button>
  <div id="list"></div>
</div>

<script>
let inspections = JSON.parse(localStorage.getItem("inspections") || "[]");

const photoInput = document.getElementById("photoInput");
const preview = document.getElementById("preview");

photoInput.addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function (e) {
    preview.src = e.target.result;
    preview.style.display = "block";
    preview.dataset.img = e.target.result;
  };
  reader.readAsDataURL(file);
});

function saveInspection() {
  const category = document.getElementById("category").value;
  const notes = document.getElementById("notes").value;
  const image = preview.dataset.img || "";

  const inspection = {
    id: Date.now(),
    category,
    notes,
    image,
    timestamp: new Date().toISOString()
  };

  inspections.unshift(inspection);
  localStorage.setItem("inspections", JSON.stringify(inspections));

  document.getElementById("notes").value = "";
  preview.style.display = "none";
  preview.src = "";

  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  inspections.forEach(i => {
    const div = document.createElement("div");
    div.className = "inspection";

    div.innerHTML = `
      <b>${i.category}</b><br>
      <span class="small">${new Date(i.timestamp).toLocaleString()}</span>
      <p>${i.notes || ""}</p>
      ${i.image ? `<img src="${i.image}" />` : ""}
    `;

    list.appendChild(div);
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify(inspections, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "inspections.json";
  a.click();
}

render();
</script>

</body>
</html>
