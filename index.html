<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airbnb Inspection App</title>

  <style>
    body {
      font-family: Arial;
      margin: 12px;
      background: #f4f4f4;
    }

    h2 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      margin: 6px 0;
    }

    .item input[type="checkbox"] {
      margin-right: 10px;
      transform: scale(1.2);
    }

    textarea {
      width: 100%;
      height: 60px;
      margin-top: 8px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: Arial;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0078D4;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #005a9e;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
      max-height: 300px;
      object-fit: cover;
    }

    .photo-container {
      position: relative;
      margin-top: 8px;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type=file] {
      position: absolute;
      left: -9999px;
    }

    .file-input-label {
      display: block;
      padding: 10px;
      background: #f0f0f0;
      border: 2px solid #0078D4;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      color: #0078D4;
      font-weight: bold;
    }

    .next-step-section {
      background: #f0f8ff;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      border-left: 4px solid #0078D4;
    }

    .next-step-section h3 {
      margin-top: 0;
      color: #0078D4;
    }

    .next-step-section textarea {
      width: 100%;
      height: 80px;
      margin-top: 8px;
    }

    .photo-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .button-group button {
      flex: 1;
      margin: 0;
    }
  </style>
</head>

<body>

<h2>Airbnb Inspection</h2>

<div class="card">
  <div class="button-group">
    <button onclick="showInspection()">New Inspection</button>
    <button onclick="showHistory()">View History</button>
  </div>
</div>

<!-- INSPECTION FORM -->
<div id="inspectionForm">

<div class="card">

  <!-- ENTRY -->
  <div class="section-title">Entry</div>
  <label class="item"><input type="checkbox" id="entry1"> Front Door closes properly</label>
  <label class="item"><input type="checkbox" id="entry2"> Smart Lock functions</label>
  <label class="item"><input type="checkbox" id="entry3"> Entry Light on</label>

  <div class="photo-container">
    <div class="file-input-wrapper">
      <input type="file" id="entryPhoto" accept="image/*" capture="environment">
      <label for="entryPhoto" class="file-input-label">📷 Take/Choose Entry Photo</label>
    </div>
    <img id="entryPreview">
    <div class="photo-label" id="entryLabel"></div>
  </div>

  <textarea id="entryNotes" placeholder="Entry notes..."></textarea>

  <!-- LIVING ROOM -->
  <div class="section-title">Living Room</div>
  <label class="item"><input type="checkbox" id="lr1"> Smell</label>
  <label class="item"><input type="checkbox" id="lr2"> Furniture made</label>
  <label class="item"><input type="checkbox" id="lr3"> TV remote visible</label>
  <label class="item"><input type="checkbox" id="lr4"> Blinds open</label>
  <label class="item"><input type="checkbox" id="lr5"> Floors clean</label>
  <label class="item"><input type="checkbox" id="lr6"> Plants watered</label>

  <div class="photo-container">
    <div class="file-input-wrapper">
      <input type="file" id="lrPhoto" accept="image/*" capture="environment">
      <label for="lrPhoto" class="file-input-label">📷 Take/Choose Living Room Photo</label>
    </div>
    <img id="lrPreview">
    <div class="photo-label" id="lrLabel"></div>
  </div>
  <textarea id="lrNotes"></textarea>

  <!-- KITCHEN -->
  <div class="section-title">Kitchen</div>
  <label class="item"><input type="checkbox" id="k1"> Countertops</label>
  <label class="item"><input type="checkbox" id="k2"> Sink</label>
  <label class="item"><input type="checkbox" id="k3"> Refrigerator</label>
  <label class="item"><input type="checkbox" id="k4"> Oven / Range</label>
  <label class="item"><input type="checkbox" id="k5"> Microwave</label>
  <label class="item"><input type="checkbox" id="k6"> Cabinets organized</label>
  <label class="item"><input type="checkbox" id="k7"> Coffee Supplies Restocked</label>
  <label class="item"><input type="checkbox" id="k8"> Trash Removed</label>

  <div class="photo-container">
    <div class="file-input-wrapper">
      <input type="file" id="kPhoto" accept="image/*" capture="environment">
      <label for="kPhoto" class="file-input-label">📷 Take/Choose Kitchen Photo</label>
    </div>
    <img id="kPreview">
    <div class="photo-label" id="kLabel"></div>
  </div>
  <textarea id="kNotes"></textarea>

  <!-- BEDROOMS -->
  <div class="section-title">Bedrooms (Bedroom 1 & 2)</div>
  <label class="item"><input type="checkbox" id="b1"> Bed Made</label>
  <label class="item"><input type="checkbox" id="b2"> Extra blankets</label>
  <label class="item"><input type="checkbox" id="b3"> Drapes tied up</label>

  <div class="photo-container">
    <div class="file-input-wrapper">
      <input type="file" id="bPhoto" accept="image/*" capture="environment">
      <label for="bPhoto" class="file-input-label">📷 Take/Choose Bedroom Photo</label>
    </div>
    <img id="bPreview">
    <div class="photo-label" id="bLabel"></div>
  </div>
  <textarea id="bNotes"></textarea>

  <!-- BATHROOM -->
  <div class="section-title">Bathroom</div>
  <label class="item"><input type="checkbox" id="ba1"> Toilet</label>
  <label class="item"><input type="checkbox" id="ba2"> Shower/Tub</label>
  <label class="item"><input type="checkbox" id="ba3"> Vanity</label>
  <label class="item"><input type="checkbox" id="ba4"> Mirror</label>
  <label class="item"><input type="checkbox" id="ba5"> Towels</label>
  <label class="item"><input type="checkbox" id="ba6"> Supplies Restocked</label>
  <label class="item"><input type="checkbox" id="ba7"> Floors</label>

  <div class="photo-container">
    <div class="file-input-wrapper">
      <input type="file" id="baPhoto" accept="image/*" capture="environment">
      <label for="baPhoto" class="file-input-label">📷 Take/Choose Bathroom Photo</label>
    </div>
    <img id="baPreview">
    <div class="photo-label" id="baLabel"></div>
  </div>
  <textarea id="baNotes"></textarea>

  <!-- LAUNDRY -->
  <div class="section-title">Laundry</div>
  <label class="item"><input type="checkbox" id="l1"> Washer</label>
  <label class="item"><input type="checkbox" id="l2"> Dryer</label>
  <label class="item"><input type="checkbox" id="l3"> Laundry Supplies</label>

  <!-- UTILITIES -->
  <div class="section-title">Utilities</div>
  <label class="item"><input type="checkbox" id="u1"> Temperature nice</label>
  <label class="item"><input type="checkbox" id="u2"> Air quality nice</label>
  <label class="item"><input type="checkbox" id="u3"> Smoke Detectors test</label>
  <label class="item"><input type="checkbox" id="u4"> CO Detector test</label>
  <label class="item"><input type="checkbox" id="u5"> Internet/Wi-Fi</label>
  <label class="item"><input type="checkbox" id="u6"> Thermostat set</label>

  <!-- INVENTORY -->
  <div class="section-title">Inventory</div>
  <label class="item"><input type="checkbox" id="i1"> Missing Items</label>
  <label class="item"><input type="checkbox" id="i2"> Broken Items</label>
  <label class="item"><input type="checkbox" id="i3"> Low Supplies</label>

  <!-- MAINTENANCE -->
  <div class="section-title">Maintenance</div>
  <label class="item"><input type="checkbox" id="m1"> Plumbing</label>
  <label class="item"><input type="checkbox" id="m2"> Electrical</label>
  <label class="item"><input type="checkbox" id="m3"> Appliances</label>
  <label class="item"><input type="checkbox" id="m4"> Furniture Damage</label>
  <label class="item"><input type="checkbox" id="m5"> Paint</label>
  <label class="item"><input type="checkbox" id="m6"> General Repairs</label>

  <!-- FINAL -->
  <div class="section-title">Final Quality Check</div>
  <label class="item"><input type="checkbox" id="f1"> Property Ready</label>
  <label class="item"><input type="checkbox" id="f2"> Lights Off</label>
  <label class="item"><input type="checkbox" id="f3"> Doors Locked</label>
  <label class="item"><input type="checkbox" id="f4"> Thermostat Set</label>

  <div class="photo-container">
    <div class="file-input-wrapper">
      <input type="file" id="finalPhoto" accept="image/*" capture="environment">
      <label for="finalPhoto" class="file-input-label">📷 Take/Choose Final Photo</label>
    </div>
    <img id="finalPreview">
    <div class="photo-label" id="finalLabel"></div>
  </div>

  <!-- NEXT STEPS -->
  <div class="next-step-section">
    <h3>Next Steps</h3>
    <textarea id="nextSteps" placeholder="List any follow-up actions or repairs needed..."></textarea>
  </div>

  <button onclick="save()">Save & Email Inspection</button>

</div>

</div>

<!-- HISTORY VIEW -->
<div id="historyView" style="display:none;">

<div class="card">
  <h2>Inspection History</h2>
  <div id="inspectionsList"></div>
</div>

</div>

<script>
const itemLabels = {
  entry1: "Front Door closes properly",
  entry2: "Smart Lock functions",
  entry3: "Entry Light on",
  lr1: "Smell",
  lr2: "Furniture made",
  lr3: "TV remote visible",
  lr4: "Blinds open",
  lr5: "Floors clean",
  lr6: "Plants watered",
  k1: "Countertops",
  k2: "Sink",
  k3: "Refrigerator",
  k4: "Oven / Range",
  k5: "Microwave",
  k6: "Cabinets organized",
  k7: "Coffee Supplies Restocked",
  k8: "Trash Removed",
  b1: "Bed Made",
  b2: "Extra blankets",
  b3: "Drapes tied up",
  ba1: "Toilet",
  ba2: "Shower/Tub",
  ba3: "Vanity",
  ba4: "Mirror",
  ba5: "Towels",
  ba6: "Supplies Restocked",
  ba7: "Floors",
  l1: "Washer",
  l2: "Dryer",
  l3: "Laundry Supplies",
  u1: "Temperature nice",
  u2: "Air quality nice",
  u3: "Smoke Detectors test",
  u4: "CO Detector test",
  u5: "Internet/Wi-Fi",
  u6: "Thermostat set",
  i1: "Missing Items",
  i2: "Broken Items",
  i3: "Low Supplies",
  m1: "Plumbing",
  m2: "Electrical",
  m3: "Appliances",
  m4: "Furniture Damage",
  m5: "Paint",
  m6: "General Repairs",
  f1: "Property Ready",
  f2: "Lights Off",
  f3: "Doors Locked",
  f4: "Thermostat Set"
};

function setupPhotoUpload(inputId, imgId, labelId) {
  const input = document.getElementById(inputId);
  const img = document.getElementById(imgId);
  const label = document.getElementById(labelId);
  
  input.addEventListener('change', function(e) {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        img.src = event.target.result;
        img.style.display = 'block';
        label.textContent = '✓ Photo added';
      };
      reader.readAsDataURL(file);
    }
  });
}

// Setup all photo uploads
setupPhotoUpload('entryPhoto', 'entryPreview', 'entryLabel');
setupPhotoUpload('lrPhoto', 'lrPreview', 'lrLabel');
setupPhotoUpload('kPhoto', 'kPreview', 'kLabel');
setupPhotoUpload('bPhoto', 'bPreview', 'bLabel');
setupPhotoUpload('baPhoto', 'baPreview', 'baLabel');
setupPhotoUpload('finalPhoto', 'finalPreview', 'finalLabel');

function showInspection() {
  document.getElementById('inspectionForm').style.display = 'block';
  document.getElementById('historyView').style.display = 'none';
}

function showHistory() {
  document.getElementById('inspectionForm').style.display = 'none';
  document.getElementById('historyView').style.display = 'block';
  loadHistory();
}

function loadHistory() {
  const inspections = JSON.parse(localStorage.getItem('inspections') || '[]');
  const container = document.getElementById('inspectionsList');
  
  if (inspections.length === 0) {
    container.innerHTML = '<p>No inspections saved yet.</p>';
    return;
  }
  
  container.innerHTML = inspections.map((inspection, index) => {
    const date = new Date(inspection.timestamp).toLocaleString();
    return `
      <div class="card" style="margin-bottom: 20px; padding: 15px; cursor: pointer;" onclick="toggleInspection(${index})">
        <h3 style="margin: 0 0 5px 0; color: #0078D4;">${date}</h3>
        <p style="margin: 0; color: #666; font-size: 14px;">Click to view full details</p>
      </div>
    `;
  }).join('') + `
    <button onclick="deleteAllInspections()" style="background: #d32f2f; margin-top: 20px;">🗑️ Delete All Inspections</button>
  `;
}

function toggleInspection(index) {
  const inspections = JSON.parse(localStorage.getItem('inspections') || '[]');
  const inspection = inspections[index];
  const elemId = `inspection-${index}`;
  const elem = document.getElementById(elemId);
  
  if (elem && elem.style.display !== 'none') {
    elem.style.display = 'none';
    return;
  }
  
  const html = formatInspectionHTML(inspection);
  
  if (elem) {
    elem.innerHTML = html;
    elem.style.display = 'block';
  } else {
    const container = document.getElementById('inspectionsList');
    const div = document.createElement('div');
    div.id = elemId;
    div.style.cssText = 'margin-top: 10px; padding: 15px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #0078D4;';
    div.innerHTML = html;
    container.insertBefore(div, container.children[index + 1]);
  }
}

function formatInspectionHTML(inspection) {
  let html = '';
  
  html += `<h3>Entry</h3>${formatSectionHTML(inspection.entry)}`;
  html += `<h3>Living Room</h3>${formatSectionHTML(inspection.livingRoom)}`;
  
  if (inspection.entryNotes) html += `<p><strong>Notes:</strong> ${inspection.entryNotes}</p>`;
  
  html += `<h3>Kitchen</h3>${formatSectionHTML(inspection.kitchen)}`;
  if (inspection.kNotes) html += `<p><strong>Notes:</strong> ${inspection.kNotes}</p>`;
  
  html += `<h3>Bedrooms</h3>${formatSectionHTML(inspection.bedroom)}`;
  if (inspection.bNotes) html += `<p><strong>Notes:</strong> ${inspection.bNotes}</p>`;
  
  html += `<h3>Bathroom</h3>${formatSectionHTML(inspection.bathroom)}`;
  if (inspection.baNotes) html += `<p><strong>Notes:</strong> ${inspection.baNotes}</p>`;
  
  html += `<h3>Laundry</h3>${formatSectionHTML(inspection.laundry)}`;
  html += `<h3>Utilities</h3>${formatSectionHTML(inspection.utilities)}`;
  html += `<h3>Inventory</h3>${formatSectionHTML(inspection.inventory)}`;
  html += `<h3>Maintenance</h3>${formatSectionHTML(inspection.maintenance)}`;
  html += `<h3>Final Quality Check</h3>${formatSectionHTML(inspection.final)}`;
  
  if (inspection.nextSteps) {
    html += `<div style="background: #f0f8ff; padding: 10px; border-radius: 6px; margin-top: 10px;">
      <strong>Next Steps:</strong><br>${inspection.nextSteps.replace(/\n/g, '<br>')}
    </div>`;
  }
  
  return html;
}

function formatSectionHTML(sectionData) {
  if (!sectionData) return '<p>No items</p>';
  
  const checked = Object.entries(sectionData)
    .filter(([key, val]) => val === true)
    .map(([key]) => `<li style="color: green;">✓ ${itemLabels[key] || key}</li>`);
  
  const unchecked = Object.entries(sectionData)
    .filter(([key, val]) => val === false)
    .map(([key]) => `<li style="color: red;">✗ ${itemLabels[key] || key}</li>`);
  
  let html = '<ul style="margin: 5px 0; padding-left: 20px;">';
  if (checked.length > 0) html += checked.join('');
  if (unchecked.length > 0) html += unchecked.join('');
  html += '</ul>';
  
  return html || '<p>No items</p>';
}

function deleteAllInspections() {
  if (confirm('Are you sure? This will delete all saved inspections.')) {
    localStorage.removeItem('inspections');
    loadHistory();
  }
}

function save() {
  const data = {
    entry: collect("entry"),
    entryNotes: document.getElementById("entryNotes").value,
    livingRoom: collect("lr"),
    lrNotes: document.getElementById("lrNotes").value,
    kitchen: collect("k"),
    kNotes: document.getElementById("kNotes").value,
    bedroom: collect("b"),
    bNotes: document.getElementById("bNotes").value,
    bathroom: collect("ba"),
    baNotes: document.getElementById("baNotes").value,
    laundry: collect("l"),
    utilities: collect("u"),
    inventory: collect("i"),
    maintenance: collect("m"),
    final: collect("f"),
    nextSteps: document.getElementById("nextSteps").value,
    timestamp: new Date().toISOString()
  };

  let existing = JSON.parse(localStorage.getItem("inspections") || "[]");
  existing.unshift(data);
  localStorage.setItem("inspections", JSON.stringify(existing));

  // Send email via FormSubmit
  sendEmail(data);
  
  alert("Inspection Saved & Email Sent");
  
  // Clear form
  document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
  document.querySelectorAll('textarea').forEach(el => el.value = '');
  document.querySelectorAll('img').forEach(el => el.src = '');
  document.querySelectorAll('.photo-label').forEach(el => el.textContent = '');
}

function collect(prefix) {
  let items = {};
  document.querySelectorAll(`[id^="${prefix}"]`).forEach(el => {
    if (el.type === "checkbox") {
      items[el.id] = el.checked;
    }
  });
  return items;
}

function sendEmail(data) {
  let summary = formatInspectionSummary(data);
  
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'https://formsubmit.co/m88vander@gmail.com';
  form.style.display = 'none';

  const subject = document.createElement('input');
  subject.type = 'hidden';
  subject.name = '_subject';
  subject.value = 'Airbnb Inspection Report - ' + new Date().toLocaleDateString();

  const message = document.createElement('textarea');
  message.name = 'message';
  message.value = summary;

  const redirect = document.createElement('input');
  redirect.type = 'hidden';
  redirect.name = '_next';
  redirect.value = window.location.href;

  form.appendChild(subject);
  form.appendChild(message);
  form.appendChild(redirect);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

function formatInspectionSummary(data) {
  let summary = `AIRBNB INSPECTION REPORT\n`;
  summary += `Date: ${new Date(data.timestamp).toLocaleString()}\n`;
  summary += `=================================\n\n`;

  summary += `ENTRY:\n${formatSectionSummary(data.entry)}`;
  if (data.entryNotes) summary += `Notes: ${data.entryNotes}\n`;
  summary += `\nLIVING ROOM:\n${formatSectionSummary(data.livingRoom)}`;
  if (data.lrNotes) summary += `Notes: ${data.lrNotes}\n`;
  summary += `\nKITCHEN:\n${formatSectionSummary(data.kitchen)}`;
  if (data.kNotes) summary += `Notes: ${data.kNotes}\n`;
  summary += `\nBEDROOMS:\n${formatSectionSummary(data.bedroom)}`;
  if (data.bNotes) summary += `Notes: ${data.bNotes}\n`;
  summary += `\nBATHROOM:\n${formatSectionSummary(data.bathroom)}`;
  if (data.baNotes) summary += `Notes: ${data.baNotes}\n`;
  summary += `\nLAUNDRY:\n${formatSectionSummary(data.laundry)}`;
  summary += `\nUTILITIES:\n${formatSectionSummary(data.utilities)}`;
  summary += `\nINVENTORY:\n${formatSectionSummary(data.inventory)}`;
  summary += `\nMAINTENANCE:\n${formatSectionSummary(data.maintenance)}`;
  summary += `\nFINAL QUALITY CHECK:\n${formatSectionSummary(data.final)}`;
  
  if (data.nextSteps) {
    summary += `\nNEXT STEPS:\n${data.nextSteps}\n`;
  }
  
  return summary;
}

function formatSectionSummary(sectionData) {
  if (!sectionData) return 'No items\n';
  
  const checked = Object.entries(sectionData)
    .filter(([key, val]) => val === true)
    .map(([key]) => `✓ ${itemLabels[key] || key}`);
  
  const unchecked = Object.entries(sectionData)
    .filter(([key, val]) => val === false)
    .map(([key]) => `✗ ${itemLabels[key] || key}`);
  
  let result = '';
  if (checked.length > 0) result += 'Checked:\n  ' + checked.join('\n  ') + '\n';
  if (unchecked.length > 0) result += 'Unchecked:\n  ' + unchecked.join('\n  ') + '\n';
  
  return result || 'No items\n';
}
</script>

</body>
</html>
